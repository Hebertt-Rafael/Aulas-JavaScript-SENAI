<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio da Aula 02 Parte 3 - JavaScript</title>
    <meta name="description" content="Conteúdo das aulas de JS">
    <meta name="keywords" content="sites,web, frontend">
    <meta name="author" content="Hebertt Rafael, heberttrafael4528@gmail.com">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        img {
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <h1>DESAFIO 03</h1>
    <hr>
    <div>
        <p>Aprendendo a como trocar uma imagem com JavaScript</p>
        <hr>
        <p>Agora vamos mostrar a imagem do desafio!</p>
    </div>
    <div style="text-align:center; margin-top:20px;">
        <img id="imagemDesafio" src="Katseye Cores.jpg" alt="DD"
            style="width:420px; max-width:100%; border-radius:12px;" />
        <br><br>
        <button onclick="trocar_imagem()">Trocar Imagem</button>
    </div>
    <script>
        function trocar_imagem() {
            const imagem = document.getElementById('imagemDesafio');

            // Verificamos se o nome "Sabrina" está presente na URL da imagem atual
            if (imagem.src.includes("Sabrina")) {
                imagem.src = "Katseye Cores.jpg";
            } else {
                imagem.src = "Sabrina Carpenter.jpg";
            }
        }
    </script>
</body>

</html>
